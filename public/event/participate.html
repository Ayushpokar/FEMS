<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <pre>

        <form>
            <select name="event_id" id="events" onchange="event_detail_show(this.value);" ><option value="" disabled selected hidden>Select Event</option></select>
            <div id="event"></div>
            Name: <input type="text" id="name">
            Email: <input type="email" name="" id="email">
            Mobile: <input type="text" name="" id="mobile">
            Employment Status: <input type="text" name="" id="status">
            Organisation Name: <input type="text" id="organisation">
            Current City: <input type="text" id="city">
            <input type="reset" value="Clear">
            <input type="button" value="Submit" onclick="participate();">
        </form>
    </pre>

    <script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const eventId = urlParams.get('id');

        console.log(eventId); // Outputs: "10"
        let responce = [];
        let selected_event_id;
        const dropdown = document.getElementById('events');
        async function eventdetails() {
            const res = await fetch('/eventdetails', {
                method: 'GET'
            });
            responce = await res.json();
            // dropdown.innerHTML = '<option value="" disabled selected>Select Event</option>';
            if (eventId) {
                const specificEvent = responce.find(e => e.event_id == eventId);

                if(specificEvent){
                    dropdown.innerHTML = `<option selected disabled value="${specificEvent.event_id}">${specificEvent.event_name}</option>`;
                    event_detail_show(eventId);
                }
            }
            else {
                responce.forEach(event => {
                    dropdown.innerHTML += `<option value="${event.event_id}">${event.event_name}${event.event_id}</option>`
                });
            }
        }

        async function event_detail_show(clickedId) {
            const data = responce.find(e => e.event_id == clickedId);
            if (!data) return;
            selected_event_id = data.event_id;
            const showevent = document.getElementById('event');
            function formatForDisplay(dateString) {
                if (!dateString) return "N/A";
                const date = new Date(dateString);

                return date.toLocaleString('en-IN', {
                    dateStyle: 'medium',
                    timeStyle: 'short'
                });
            }
            showevent.innerHTML = `            
            Event Name: ${data.event_name}
            About Event: ${data.descrp}
            Event vanue: ${data.venue}
            Event Guest: ${data.guest_name}
            Event Registration fee: ${data.registration_fee}
            Event Date: ${formatForDisplay(data.start_date)} TO ${formatForDisplay(data.end_date)}
            `;

        }
        eventdetails();
        async function participate() {
            const payload = {
                "event_id": selected_event_id,
                "name": document.getElementById('name').value,
                "email": document.getElementById('email').value,
                "mobile": document.getElementById('mobile').value,
                "employment_status": document.getElementById('status').value,
                "organisation_name": document.getElementById('organisation').value,
                "city": document.getElementById('city').value

            }
            console.log(payload);
            const res = await fetch('/api/event/participate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            const result = res.json();
            alert(result.message);
        }

    </script>
</body>

</html>
